  <circle cx="25" cy="29" r="4.5" fill="#a78bfa"/>
  <circle cx="25" cy="54" r="4.5" fill="#a78bfa"/>
  <circle cx="25" cy="79" r="4.5" fill="#a78bfa"/>
  <!-- Right tuner housings -->
  <rect x="88" y="20" width="14" height="18" rx="3.5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
  <rect x="88" y="45" width="14" height="18" rx="3.5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
  <rect x="88" y="70" width="14" height="18" rx="3.5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
