  <!-- Neck -->
  <rect x="46" y="99.5" width="28" height="46" rx="4" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
  <!-- Fret lines -->
  <line x1="47" y1="110" x2="73" y2="110" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
  <line x1="47" y1="122" x2="73" y2="122" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
  <!-- Strings -->
  <line x1="38" y1="10" x2="38" y2="145" stroke="rgba(255,255,255,0.38)" stroke-width="1.1"/>
  <line x1="46" y1="10" x2="46" y2="145" stroke="rgba(255,255,255,0.28)" stroke-width="0.75"/>
  <line x1="54" y1="10" x2="54" y2="145" stroke="rgba(255,255,255,0.24)" stroke-width="0.65"/>
  <line x1="66" y1="10" x2="66" y2="145" stroke="rgba(255,255,255,0.24)" stroke-width="0.65"/>
  <line x1="74" y1="10" x2="74" y2="145" stroke="rgba(255,255,255,0.28)" stroke-width="0.75"/>
  <line x1="82" y1="10" x2="82" y2="145" stroke="rgba(255,255,255,0.38)" stroke-width="1.1"/>
  <!-- Left tuner housings -->
  <rect x="18" y="20" width="14" height="18" rx="3.5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
  <rect x="18" y="45" width="14" height="18" rx="3.5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
  <rect x="18" y="70" width="14" height="18" rx="3.5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
