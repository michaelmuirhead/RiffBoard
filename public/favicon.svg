<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 148" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0840"/>
      <stop offset="50%" style="stop-color:#3b1278"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="120" height="148" rx="27"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="120" height="148" rx="27" fill="url(#bg)"/>
  <!-- Nut -->
  <rect x="26" y="94" width="68" height="5.5" rx="1.5" fill="rgba(255,255,255,0.92)"/>
